<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pro Tracker v7.0</title>
    <style>
        :root { --gold: #ffd700; --dark: #080808; --card: #141414; --green: #00ff88; --gray: #252525; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 1000px; width: 100%; }
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--gray); padding-bottom: 20px; }
        h1 { color: #fff; font-weight: 900; letter-spacing: -1px; margin: 0; }

        /* Maç Listesi */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid var(--gray); cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { border-color: #555; transform: translateY(-2px); }
        .card.active { border-color: var(--gold); background: #1a1a1a; }
        .card.finished { opacity: 0.8; border-color: var(--green); cursor: default; }
        .teams { font-weight: bold; font-size: 1.1em; margin: 5px 0; }
        .league { font-size: 0.7em; color: #666; font-weight: bold; text-transform: uppercase; }
        .tag-win { position: absolute; top: 10px; right: 10px; background: var(--green); color: #000; font-size: 0.65em; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        /* Simülatör Panel */
        .sim-container { background: #000; border-radius: 20px; border: 1px solid #333; padding: 40px; text-align: center; display: none; margin-top: 20px; }
        .timer { font-size: 4em; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .score-board { font-size: 3.5em; font-weight: 800; margin-bottom: 40px; color: var(--gold); }

        /* Timeline */
        .timeline-container { position: relative; margin: 60px 0 40px 0; padding: 0 20px; }
        .timeline-wrapper { position: relative; height: 6px; background: var(--gray); border-radius: 3px; }
        .timeline-progress { position: absolute; left: 0; top: 0; height: 100%; background: #fff; width: 0%; border-radius: 3px; }
        .event-marker { position: absolute; transform: translateX(-50%); bottom: 20px; text-align: center; min-width: 35px; animation: fadeInUp 0.5s ease-out; }
        .event-marker span { font-size: 1.5em; display: block; }
        .event-marker .min-label { font-size: 0.7em; color: #888; margin-top: 3px; font-weight: bold; }
        @keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

        .btn-start { background: #fff; color: #000; border: none; padding: 18px 50px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 1em; transition: 0.2s; }
        .btn-start:hover:not(:disabled) { background: var(--gold); }
        .btn-start:disabled { background: #222; color: #444; cursor: not-allowed; }
        
        .match-log { font-size: 1.1em; color: var(--green); margin-top: 30px; min-height: 24px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>PRO MATCH TRACKER</h1></header>
    
    <div class="grid">
        <div class="card finished">
            <span class="tag-win">KAZANDI ✅</span>
            <div class="league">FA CUP</div>
            <div class="teams">Man City 4 - 0 Liverpool</div>
            <div style="font-size: 0.75em; color: var(--green);">Tahmin: 2.5 ÜST</div>
        </div>

        <div class="card" onclick="setupMatch('Lazio', 'Parma', 2.1, 'Serie A', 'MS1', ['G. Isaksen', 'K. Taylor', 'Pedro'], ['M. Pellegrino'])">
            <div class="league">SERIE A • 21:45</div>
            <div class="teams">Lazio vs Parma</div>
            <div style="font-size: 0.75em; color: #555;">Tahmin: MS 1</div>
        </div>

        <div class="card" onclick="setupMatch('Southampton', 'Arsenal', 3.4, 'FA Cup', 'UST', ['V. Gyökeres', 'B. Saka', 'M. Odegaard'], ['S. Edozie'])">
            <div class="league">FA CUP • 22:00</div>
            <div class="teams">Southampton vs Arsenal</div>
            <div style="font-size: 0.75em; color: #555;">Tahmin: 2.5 ÜST</div>
        </div>

        <div class="card" onclick="setupMatch('Lille', 'Lens', 2.8, 'Ligue 1', 'KG', ['O. Giroud', 'H. Haraldsson'], ['O. Edouard', 'F. Thauvin'])">
            <div class="league">LIGUE 1 • 22:05</div>
            <div class="teams">Lille vs Lens</div>
            <div style="font-size: 0.75em; color: #555;">Tahmin: KG VAR</div>
        </div>
    </div>

    <div class="sim-container" id="sim-section">
        <h2 id="match-title" style="font-size: 1.2em; color: #888;">VERİ ANALİZİ</h2>
        <div class="timer" id="clock">00'</div>
        <div class="score-board" id="live-score">0 - 0</div>
        
        <div class="timeline-container">
            <div id="event-layer"></div>
            <div class="timeline-wrapper"><div class="timeline-progress" id="progress-bar"></div></div>
        </div>

        <button class="btn-start" id="start-btn" onclick="startSim()">SİMÜLASYONU BAŞLAT</button>
        <div class="match-log" id="status-log">Santra için bekleniyor...</div>
    </div>
</div>

<script>
    let matchData = { home: "", away: "", xG: 0, type: "", hPlayers: [], aPlayers: [] };
    let events = [];
    let hScore = 0, aScore = 0;

    function setupMatch(h, a, xg, lg, type, hp, ap) {
        matchData = { home: h, away: a, xG: xg, type: type, hPlayers: hp, aPlayers: ap };
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('sim-section').style.display = 'block';
        document.getElementById('match-title').innerText = `${h} vs ${a} | ${lg}`;
        document.getElementById('live-score').innerText = "0 - 0";
        document.getElementById('clock').innerText = "00'";
        document.getElementById('start-btn').disabled = false;
        document.getElementById('event-layer').innerHTML = "";
        document.getElementById('progress-bar').style.width = "0%";
        hScore = 0; aScore = 0;
        generateEvents();
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function generateEvents() {
        events = [];
        events.push({ min: 45, type: 'HALF' });
        let isSuccess = Math.random() < 0.85;
        let goalsToGenerate = Math.floor(Math.random() * matchData.xG + 1);

        if (isSuccess) {
            if(matchData.type === 'UST') goalsToGenerate = Math.max(3, goalsToGenerate); 
            if(matchData.type === 'KG') {
                events.push({ min: Math.floor(Math.random() * 35) + 5, type: 'GOAL', team: 'H' });
                events.push({ min: Math.floor(Math.random() * 40) + 48, type: 'GOAL', team: 'A' });
                goalsToGenerate = Math.floor(Math.random() * 2); 
            }
        }

        for(let i=0; i < goalsToGenerate; i++) {
            let team = matchData.type === 'MS1' ? (Math.random() > 0.2 ? 'H' : 'A') : (Math.random() > 0.5 ? 'H' : 'A');
            events.push({ min: Math.floor(Math.random() * 88) + 2, type: 'GOAL', team: team });
        }

        let cards = Math.floor(Math.random() * 3);
        for(let i=0; i<cards; i++) {
            events.push({ min: Math.floor(Math.random() * 89) + 1, type: Math.random() > 0.9 ? 'RED' : 'YELLOW' });
        }
        events.sort((a, b) => a.min - b.min);
    }

    function startSim() {
        const btn = document.getElementById('start-btn');
        const clock = document.getElementById('clock');
        const progress = document.getElementById('progress-bar');
        const log = document.getElementById('status-log');
        const scoreBoard = document.getElementById('live-score');
        btn.disabled = true;
        let currentMin = 0;
        let intervalTime = 15000 / 90;

        let sim = setInterval(() => {
            currentMin++;
            clock.innerText = currentMin + "'";
            progress.style.width = (currentMin / 90) * 100 + "%";

            events.forEach(ev => {
                if(ev.min === currentMin) {
                    const layer = document.getElementById('event-layer');
                    const marker = document.createElement('div');
                    marker.className = 'event-marker';
                    marker.style.left = (ev.min / 90) * 100 + "%";
                    let icon = ev.type === 'GOAL' ? "⚽" : (ev.type === 'YELLOW' ? "🟨" : (ev.type === 'RED' ? "🟥" : "🏁"));
                    marker.innerHTML = `<span>${icon}</span><div class="min-label">${ev.min}'</div>`;
                    layer.appendChild(marker);

                    if(ev.type === 'GOAL') {
                        let players = ev.team === 'H' ? matchData.hPlayers : matchData.aPlayers;
                        let scorer = players[Math.floor(Math.random() * players.length)];
                        if(ev.team === 'H') hScore++; else aScore++;
                        scoreBoard.innerText = `${hScore} - ${aScore}`;
                        log.innerText = `⚽ ${ev.min}' GOOOL! | ${scorer}`;
                    }
                }
            });

            if(currentMin >= 90) {
                clearInterval(sim);
                log.innerText = "MAÇ SONUCU: " + scoreBoard.innerText;
                btn.disabled = false;
            }
        }, intervalTime);
    }
</script>
</body>
</html>
